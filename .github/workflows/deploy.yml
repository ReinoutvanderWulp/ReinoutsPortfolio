name: Build & Deploy

on:
  push:
    branches: [main]

jobs:
  deploy:
    runs-on: ubuntu-latest
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
    steps:
      - name: Code ophalen
        uses: actions/checkout@v4

      - name: pnpm installeren
        uses: pnpm/action-setup@v4
        with:
          version: 9.14.2

      - name: Node.js instellen
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm

      - name: Dependencies installeren
        run: pnpm install --frozen-lockfile

      - name: Vite build uitvoeren
        run: pnpm run build

      - name: SSH sleutel instellen
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.PROXMOX_SSH_KEY }}" > ~/.ssh/deploy_key
          chmod 600 ~/.ssh/deploy_key
          ssh-keyscan -H -p ${{ secrets.PROXMOX_PORT }} ${{ secrets.PROXMOX_HOST }} >> ~/.ssh/known_hosts

      - name: Bestanden uploaden via rsync
        run: |
          rsync -avz --delete \
            -e "ssh -i ~/.ssh/deploy_key -p ${{ secrets.PROXMOX_PORT }} -o StrictHostKeyChecking=no" \
            dist/ \
            ${{ secrets.PROXMOX_USER }}@${{ secrets.PROXMOX_HOST }}:/var/www/reinoutsportfolio/

      - name: Nginx herladen op Proxmox
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.PROXMOX_HOST }}
          username: ${{ secrets.PROXMOX_USER }}
          key: ${{ secrets.PROXMOX_SSH_KEY }}
          port: ${{ secrets.PROXMOX_PORT }}
          script: sudo systemctl reload nginx